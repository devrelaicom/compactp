name: docs

on:
  pull_request:
    paths:
      - 'crates/**'
      - '.github/workflows/docs.yml'
  push:
    branches: [main, initial-draft]

env:
  CARGO_TERM_COLOR: always
  RUSTDOCFLAGS: "-D warnings"

jobs:
  build:
    name: Build rustdoc for library crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs
      - name: Build docs for every library crate
        run: |
          set -euo pipefail
          for crate in compactp_diagnostics compactp_lexer compactp_syntax compactp_ast compactp_parser; do
            echo "::group::cargo doc -p $crate"
            cargo doc --no-deps -p "$crate"
            echo "::endgroup::"
          done
